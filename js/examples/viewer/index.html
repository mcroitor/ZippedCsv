<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zipped CSV Viewer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f2f5;
        color: #1a1a2e;
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      #app { max-width: 1200px; margin: 0 auto; }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }

      /* ── Upload card ───────────────────────────────────────────── */
      .upload-card {
        background: #fff;
        border-radius: 12px;
        padding: 1.5rem 2rem;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .upload-card label {
        font-weight: 600;
        font-size: 0.95rem;
        color: #374151;
        white-space: nowrap;
      }

      input[type="file"] {
        flex: 1;
        min-width: 0;
        font-size: 0.9rem;
        color: #555;
        cursor: pointer;
      }

      /* ── Error banner ──────────────────────────────────────────── */
      #error {
        background: #fff0f0;
        border: 1px solid #f5c2c2;
        color: #c0392b;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }

      /* ── Metadata bar ──────────────────────────────────────────── */
      #metadata {
        background: #fff;
        border-radius: 10px;
        padding: 0.7rem 1.25rem;
        margin-bottom: 1.25rem;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 1.5rem;
        font-size: 0.82rem;
        color: #374151;
      }

      .meta-item strong { color: #6b7280; font-weight: 500; }

      /* ── Tabs container ────────────────────────────────────────── */
      #tabs-container {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
        overflow: hidden;
      }

      #tab-buttons {
        display: flex;
        flex-wrap: wrap;
        border-bottom: 2px solid #e8eaed;
        background: #f8f9fa;
        padding: 0 0.5rem;
        gap: 0;
      }

      .tab-btn {
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        padding: 0.75rem 1.1rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        color: #6b7280;
        margin-bottom: -2px;
        transition: color 0.15s, border-color 0.15s;
        white-space: nowrap;
      }

      .tab-btn:hover { color: #111827; }

      .tab-btn.active {
        color: #2563eb;
        border-bottom-color: #2563eb;
        font-weight: 600;
      }

      /* ── Table area ────────────────────────────────────────────── */
      #tab-content { padding: 1rem 1.25rem 1.25rem; }

      .table-wrap { overflow-x: auto; }

      table {
        border-collapse: collapse;
        font-size: 0.85rem;
        table-layout: auto;
      }

      thead th {
        background: #f1f5f9;
        text-align: left;
        padding: 0.5rem 0.9rem;
        font-weight: 600;
        color: #374151;
        border: 1px solid #d1d5db;
        white-space: nowrap;
        position: sticky;
        top: 0;
      }

      tbody tr:nth-child(even) { background: #f9fafb; }

      tbody td {
        padding: 0.4rem 0.9rem;
        border: 1px solid #e5e7eb;
        color: #4b5563;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      tbody tr:hover td { background: #eff6ff; }

      .empty-msg {
        color: #9ca3af;
        font-size: 0.875rem;
        padding: 0.75rem 0;
      }

      .row-count {
        font-size: 0.775rem;
        color: #9ca3af;
        text-align: right;
        padding-top: 0.6rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Zipped CSV Viewer</h1>

      <div class="upload-card">
        <label for="file-input">Open .zcsv file</label>
        <input type="file" id="file-input" accept=".zcsv,.zip" />
      </div>

      <div id="error" hidden></div>
      <div id="metadata" hidden></div>

      <div id="tabs-container" hidden>
        <div id="tab-buttons"></div>
        <div id="tab-content"></div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
